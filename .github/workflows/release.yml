name: Build & Release

# Builds GTA6-Tracker-Source.zip (the full project source, via git archive).
# - On a pushed tag like "v1.1.0": attaches the source zip to the GitHub Release.
# - On a pull request / manual run: uploads it as a build artifact.
# The .exe installer is built by installer.yml and attached to the same release.
on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source zip
        run: git archive --format=zip --prefix=GTA6-Tracker-Source/ -o GTA6-Tracker-Source.zip HEAD

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GTA6-Tracker-Source
          path: GTA6-Tracker-Source.zip

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GTA6-Tracker-Source.zip
          generate_release_notes: true
