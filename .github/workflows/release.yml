name: Build & Release

# Builds GTA6-Tracker.zip automatically.
# - On a pushed tag like "v1.0.0": publishes a GitHub Release with the zip attached.
# - On manual run (Actions tab -> Run workflow): uploads the zip as a build artifact.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build the zip
        run: python build_zip.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GTA6-Tracker
          path: GTA6-Tracker.zip

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GTA6-Tracker.zip
          generate_release_notes: true
