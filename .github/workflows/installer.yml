name: Build Installer

# Builds the Windows installer GTA6-Tracker-Setup.exe (PyInstaller + Inno Setup).
# - On a pushed tag "v*": attaches the installer to the GitHub Release.
# - On manual run (Actions tab): uploads it as a build artifact.
on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build the .exe (PyInstaller)
        run: pyinstaller --noconfirm GTA6-Tracker.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build the installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer.iss

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GTA6-Tracker-Setup
          path: installer_output/GTA6-Tracker-Setup.exe

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/GTA6-Tracker-Setup.exe
